services:
  backend:
    image: eclipse-temurin:8-jre
    container_name: ${COMPOSE_PROJECT_NAME:-crm-staging}-backend
    restart: unless-stopped
    env_file:
      - ${RELEASE_DIR}/.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
    volumes:
      - ${RELEASE_DIR}/apps/api:/app/apps/api:ro
    command:
      - java
      - -jar
      - /app/apps/api/crm-backend-1.0.0.jar
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-crm-staging}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ${RELEASE_DIR}/apps/web/dist:/usr/share/nginx/html:ro
      - ${RELEASE_DIR}/apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-5173}:80"
