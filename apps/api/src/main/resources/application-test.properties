app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.tenant-id=tenant_test
spring.datasource.url=jdbc:h2:mem:crmtest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false

spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
spring.rabbitmq.dynamic=false
lead.import.listener.enabled=false
lead.import.mq.declare.enabled=false
lead.import.mq.publish.enabled=false
crm.cache.invalidation.mode=${CRM_CACHE_INVALIDATION_MODE:tenant}
tenant.reject-missing=${TENANT_REJECT_MISSING:false}
auth.token.secret=${AUTH_TOKEN_SECRET:test-auth-token-secret-for-ci-only}
auth.token.allow-unsafe-fallback=${AUTH_TOKEN_ALLOW_UNSAFE_FALLBACK:false}
auth.register.invite-only=${AUTH_REGISTER_INVITE_ONLY:true}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
workflow.approval-callback.token=${WORKFLOW_APPROVAL_CALLBACK_TOKEN:}
workflow.approval-callback.tokens=${WORKFLOW_APPROVAL_CALLBACK_TOKENS:}
# Example: .example.com,.internal.example
integration.webhook.allowed-host-suffixes=${INTEGRATION_WEBHOOK_ALLOWED_HOST_SUFFIXES:}
