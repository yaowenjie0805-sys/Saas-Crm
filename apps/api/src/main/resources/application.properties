# ===========================================
# CRM Application Configuration | CRM 应用配置
# ===========================================

# -------------------------------------------
# Server | 服务器配置
# -------------------------------------------
# Server port | 服务端口
server.port=${PORT:8080}
# Active Spring profile (dev/prod) | 激活的 Spring 配置文件
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -------------------------------------------
# JPA / Hibernate | JPA 配置
# -------------------------------------------
# Show SQL in console (false in production) | 控制台显示 SQL（生产环境设为 false）
spring.jpa.show-sql=false
# Disable OSIV pattern (recommended for API) | 禁用 OSIV 模式（API 服务推荐禁用）
spring.jpa.open-in-view=false
# MVC async request timeout | MVC 异步请求超时
spring.mvc.async.request-timeout=15000
# Tomcat connection timeout | Tomcat 连接超时
server.tomcat.connection-timeout=10000

# -------------------------------------------
# Authentication | 认证配置
# -------------------------------------------
# JWT token secret | JWT 令牌密钥（生产环境必须修改，必须是至少32字符的随机字符串）
auth.token.secret=${AUTH_TOKEN_SECRET:}
# Token TTL in milliseconds | 令牌有效期（毫秒）
auth.token.ttl-ms=${AUTH_TOKEN_TTL_MS:86400000}
# Cookie name | Cookie 名称
auth.cookie.name=${AUTH_COOKIE_NAME:CRM_SESSION}
# Cookie path | Cookie 路径
auth.cookie.path=${AUTH_COOKIE_PATH:/}
# Cookie SameSite policy | Cookie SameSite 策略
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
# Cookie secure flag (true for HTTPS) | Cookie 安全标志（HTTPS 时设为 true）
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
# Cookie max age in seconds | Cookie 最大有效期（秒）
auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS:86400}
# Default password for bootstrap user | 引导用户默认密码（生产环境必须修改）
auth.bootstrap.default-password=${AUTH_BOOTSTRAP_DEFAULT_PASSWORD:CHANGE_ME_IN_PRODUCTION}
# Enable seed data | 启用种子数据
app.seed.enabled=${APP_SEED_ENABLED:true}
# Enable demo data | 启用演示数据
app.seed.demo.enabled=${APP_SEED_DEMO_ENABLED:true}

# -------------------------------------------
# Security | 安全配置
# -------------------------------------------
# Allowed CORS origins | 允许的跨域来源
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:14173,http://127.0.0.1:14173}
# Rate limit enabled | 是否启用限流
security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
# Rate limit window in milliseconds | 限流时间窗口（毫秒）
security.rate-limit.window-ms=${SECURITY_RATE_LIMIT_WINDOW_MS:60000}
# Max requests per window | 时间窗口内最大请求数
security.rate-limit.max-requests=${SECURITY_RATE_LIMIT_MAX_REQUESTS:180}
# Block duration in milliseconds | 封禁时长（毫秒）
security.rate-limit.block-ms=${SECURITY_RATE_LIMIT_BLOCK_MS:60000}
# Login rate limit | 登录限流
security.rate-limit.login.max-requests=${SECURITY_RATE_LIMIT_LOGIN_MAX_REQUESTS:30}
# Approval rate limit | 审批限流
security.rate-limit.approval.max-requests=${SECURITY_RATE_LIMIT_APPROVAL_MAX_REQUESTS:120}
# Batch retry rate limit | 批量重试限流
security.rate-limit.batch-retry.max-requests=${SECURITY_RATE_LIMIT_BATCH_RETRY_MAX_REQUESTS:20}
# Export rate limit | 导出限流
security.rate-limit.export.max-requests=${SECURITY_RATE_LIMIT_EXPORT_MAX_REQUESTS:40}

# Login risk control | 登录风险控制
security.login-risk.max-failures=${SECURITY_LOGIN_RISK_MAX_FAILURES:5}
security.login-risk.window-ms=${SECURITY_LOGIN_RISK_WINDOW_MS:300000}
security.login-risk.lock-ms=${SECURITY_LOGIN_RISK_LOCK_MS:600000}

# MFA settings | 多因素认证设置
security.mfa.enabled=${SECURITY_MFA_ENABLED:false}
security.mfa.protected-roles=${SECURITY_MFA_PROTECTED_ROLES:ADMIN,MANAGER}
security.mfa.static-code=${SECURITY_MFA_STATIC_CODE:}

# SSO settings | 单点登录设置
security.sso.enabled=${SECURITY_SSO_ENABLED:false}
security.sso.provider-name=${SECURITY_SSO_PROVIDER_NAME:Enterprise SSO}
security.sso.mode=${SECURITY_SSO_MODE:mock}
security.sso.mock-code=${SECURITY_SSO_MOCK_CODE:SSO-ACCESS}
security.sso.default-role=${SECURITY_SSO_DEFAULT_ROLE:ANALYST}
security.sso.auto-provision=${SECURITY_SSO_AUTO_PROVISION:true}
security.sso.oidc.client-id=${SECURITY_SSO_OIDC_CLIENT_ID:}
security.sso.oidc.client-secret=${SECURITY_SSO_OIDC_CLIENT_SECRET:}
security.sso.oidc.authorize-endpoint=${SECURITY_SSO_OIDC_AUTHORIZE_ENDPOINT:}
security.sso.oidc.token-endpoint=${SECURITY_SSO_OIDC_TOKEN_ENDPOINT:}
security.sso.oidc.jwks-uri=${SECURITY_SSO_OIDC_JWKS_URI:}
security.sso.oidc.redirect-uri=${SECURITY_SSO_OIDC_REDIRECT_URI:http://localhost:5173}
security.sso.oidc.username-claim=${SECURITY_SSO_OIDC_USERNAME_CLAIM:preferred_username}
security.sso.oidc.display-name-claim=${SECURITY_SSO_OIDC_DISPLAY_NAME_CLAIM:name}
security.sso.oidc.scope=${SECURITY_SSO_OIDC_SCOPE:openid profile email}

# -------------------------------------------
# Integrations | 集成配置
# -------------------------------------------
# Notification max retries | 通知最大重试次数
integration.notifications.max-retries=${INTEGRATION_NOTIFICATIONS_MAX_RETRIES:5}
# Notification scan interval | 通知扫描间隔
integration.notifications.scan-ms=${INTEGRATION_NOTIFICATIONS_SCAN_MS:20000}
# Notification batch max size | 通知批量最大数量
integration.notifications.batch-max-size=${INTEGRATION_NOTIFICATIONS_BATCH_MAX_SIZE:100}
# Enabled webhook providers | 启用的 Webhook 提供商
integration.webhooks.providers=${INTEGRATION_WEBHOOK_PROVIDERS:WECOM,DINGTALK}

# WeCom webhook | 企业微信 Webhook
integration.wecom.webhook-url=${INTEGRATION_WECOM_WEBHOOK_URL:}
integration.wecom.secret=${INTEGRATION_WECOM_SECRET:}

# DingTalk webhook | 钉钉 Webhook
integration.dingtalk.webhook-url=${INTEGRATION_DINGTALK_WEBHOOK_URL:}
integration.dingtalk.secret=${INTEGRATION_DINGTALK_SECRET:}

# Feishu webhook | 飞书 Webhook
integration.feishu.webhook-url=${INTEGRATION_FEISHU_WEBHOOK_URL:}
integration.feishu.secret=${INTEGRATION_FEISHU_SECRET:}

# Feishu App mode | 飞书 App 模式
integration.feishu.app-id=${INTEGRATION_FEISHU_APP_ID:}
integration.feishu.app-secret=${INTEGRATION_FEISHU_APP_SECRET:}
integration.feishu.receive-id=${INTEGRATION_FEISHU_RECEIVE_ID:}
integration.feishu.receive-id-type=${INTEGRATION_FEISHU_RECEIVE_ID_TYPE:chat_id}
integration.feishu.base-url=${INTEGRATION_FEISHU_BASE_URL:https://open.feishu.cn}

# -------------------------------------------
# Lead Import | 线索导入配置
# -------------------------------------------
# Import chunk size | 导入分块大小
lead.import.chunk-size=${LEAD_IMPORT_CHUNK_SIZE:1000}
# Import max retries | 导入最大重试次数
lead.import.max-retries=${LEAD_IMPORT_MAX_RETRIES:3}
# Import max rows | 导入最大行数
lead.import.max-rows=${LEAD_IMPORT_MAX_ROWS:200000}
# Import max file size (MB) | 导入文件最大大小（MB）
lead.import.max-file-mb=${LEAD_IMPORT_MAX_FILE_MB:20}
# Max concurrent imports per tenant | 每租户最大并发导入数
lead.import.max-concurrent-per-tenant=${LEAD_IMPORT_MAX_CONCURRENT_PER_TENANT:2}
# Failed rows export max rows | 失败行导出最大行数
lead.import.failed-rows-export.max-rows=${LEAD_IMPORT_FAILED_ROWS_EXPORT_MAX_ROWS:50000}
lead.import.listener.enabled=${LEAD_IMPORT_LISTENER_ENABLED:true}
lead.import.mq.declare.enabled=${LEAD_IMPORT_MQ_DECLARE_ENABLED:true}
lead.import.mq.publish.enabled=${LEAD_IMPORT_MQ_PUBLISH_ENABLED:true}

# -------------------------------------------
# RabbitMQ | 消息队列配置
# -------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# -------------------------------------------
# Operations | 运维配置
# -------------------------------------------
# Slow log threshold (ms) | 慢日志阈值（毫秒）
ops.slow-log-threshold-ms=${OPS_SLOW_LOG_THRESHOLD_MS:500}

# -------------------------------------------
# Cache | 缓存配置
# -------------------------------------------
# Enable Redis cache | 启用 Redis 缓存
crm.cache.redis.enabled=${CRM_CACHE_REDIS_ENABLED:true}
# Cache invalidation mode | 缓存失效模式
crm.cache.invalidation.mode=${CRM_CACHE_INVALIDATION_MODE:tenant}
# Default cache TTL | 默认缓存 TTL
crm.cache.default.ttl-ms=${CRM_CACHE_DEFAULT_TTL_MS:60000}
# Dashboard cache TTL | 仪表盘缓存 TTL
crm.cache.dashboard.ttl-ms=${CRM_CACHE_DASHBOARD_TTL_MS:90000}
# Reports cache TTL | 报表缓存 TTL
crm.cache.reports.ttl-ms=${CRM_CACHE_REPORTS_TTL_MS:120000}
# Workbench cache TTL | 工作台缓存 TTL
crm.cache.workbench.ttl-ms=${CRM_CACHE_WORKBENCH_TTL_MS:90000}
# Timeline cache TTL | 时间线缓存 TTL
crm.cache.timeline.ttl-ms=${CRM_CACHE_TIMELINE_TTL_MS:180000}
# Commerce cache TTL | 商务缓存 TTL
crm.cache.commerce.ttl-ms=${CRM_CACHE_COMMERCE_TTL_MS:90000}
# List cache TTL | 列表缓存 TTL
crm.cache.list.ttl-ms=${CRM_CACHE_LIST_TTL_MS:45000}

# -------------------------------------------
# Logging | 日志配置
# -------------------------------------------
# Structured logging with MDC context | 带 MDC 上下文的结构化日志
# Includes traceId, tenantId, userId | 包含追踪ID、租户ID、用户ID
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-}] [%X{tenantId:-}] [%X{userId:-}] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-}] [%X{tenantId:-}] [%X{userId:-}] %-5level %logger{36} - %msg%n

# -------------------------------------------
# HikariCP Connection Pool | HikariCP 连接池配置
# -------------------------------------------
# Maximum pool size | 最大连接数
spring.datasource.hikari.maximum-pool-size=20
# Minimum idle connections | 最小空闲连接数
spring.datasource.hikari.minimum-idle=5
# Connection timeout (ms) | 连接超时（毫秒）
spring.datasource.hikari.connection-timeout=20000
# Idle timeout (ms) | 空闲超时（毫秒）
spring.datasource.hikari.idle-timeout=600000
# Max lifetime (ms) | 最大生命周期（毫秒）
spring.datasource.hikari.max-lifetime=1800000
# Connection test query | 连接测试查询
spring.datasource.hikari.connection-test-query=SELECT 1
# Validation timeout (ms) | 验证超时（毫秒）
spring.datasource.hikari.validation-timeout=5000
# Leak detection threshold (ms) | 连接泄露检测阈值（毫秒）
spring.datasource.hikari.leak-detection-threshold=60000

# -------------------------------------------
# API Documentation | API 文档配置 (Swagger UI)
# -------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.packages-to-scan=com.yao.crm.controller
