spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:50}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT_MS:5000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:2000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:180000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:900000}
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_THRESHOLD_MS:60000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false

lead.import.listener.enabled=true
lead.import.mq.declare.enabled=true
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.tenant-id=${APP_SEED_TENANT_ID:}
app.seed.reset-bootstrap-password=false
app.seed.demo.enabled=${APP_SEED_DEMO_ENABLED:false}
crm.cache.invalidation.mode=${CRM_CACHE_INVALIDATION_MODE:tenant}
auth.cookie.secure=${AUTH_COOKIE_SECURE:true}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:https://crm.example.com}
integration.webhook.allowed-host-suffixes=${INTEGRATION_WEBHOOK_ALLOWED_HOST_SUFFIXES:}
security.sso.mode=${SECURITY_SSO_MODE:oidc}
tenant.reject-missing=${TENANT_REJECT_MISSING:true}
auth.token.allow-unsafe-fallback=${AUTH_TOKEN_ALLOW_UNSAFE_FALLBACK:false}
auth.register.invite-only=${AUTH_REGISTER_INVITE_ONLY:true}
workflow.approval-callback.token=${WORKFLOW_APPROVAL_CALLBACK_TOKEN:}
workflow.approval-callback.tokens=${WORKFLOW_APPROVAL_CALLBACK_TOKENS:}
