app.seed.enabled=true
app.seed.tenant-id=tenant_test
app.seed.reset-bootstrap-password=true
auth.bootstrap.default-password=admin123
spring.datasource.url=jdbc:h2:mem:crmtest-${random.int};MODE=MySQL;DB_CLOSE_DELAY=0;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
# Flyway is disabled in test profile because H2 has migration syntax differences vs MySQL.

auth.token.secret=test-secret
auth.token.ttl-ms=86400000
security.rate-limit.enabled=false
security.sso.enabled=true
security.sso.provider-name=Test SSO
security.sso.mode=mock
security.sso.mock-code=SSO-ACCESS
security.sso.default-role=ANALYST
security.sso.auto-provision=true
security.login-risk.max-failures=9999
security.login-risk.lock-ms=1
integration.notifications.batch-max-size=2
tenant.reject-missing=false
auth.cookie.secure=false
auth.cookie.same-site=Lax
security.cors.allowed-origins=http://localhost:5173
