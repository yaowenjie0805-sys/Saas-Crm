spring.datasource.url=jdbc:h2:mem:crmtest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false
spring.flyway.target=10

auth.token.secret=test-secret
auth.token.ttl-ms=86400000
security.rate-limit.enabled=false
security.sso.enabled=true
security.sso.provider-name=Test SSO
security.sso.mode=mock
security.sso.mock-code=SSO-ACCESS
security.sso.default-role=ANALYST
security.sso.auto-provision=true
integration.notifications.batch-max-size=2
