name: Staging Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to release to staging"
        required: false
        default: "main"

concurrency:
  group: staging-release-${{ github.ref }}-${{ github.event.inputs.ref || 'main' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  staging-release:
    runs-on: windows-latest
    timeout-minutes: 60
    environment: staging
    env:
      AUTH_TOKEN_SECRET: ${{ secrets.CI_AUTH_TOKEN_SECRET }}
      SECURITY_MFA_STATIC_CODE: ${{ secrets.CI_MFA_STATIC_CODE }}
      SECURITY_SSO_MODE: oidc
      AUTH_BOOTSTRAP_DEFAULT_PASSWORD: ${{ secrets.CI_BOOTSTRAP_PASSWORD }}
      DB_URL: jdbc:mysql://127.0.0.1:3306/crm_local
      DB_USER: ${{ secrets.CI_DB_USER }}
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      LEAD_IMPORT_MQ_PUBLISH_ENABLED: "false"
      PREFLIGHT_SKIP_DRILL_EVIDENCE: "false"
      PREFLIGHT_SKIP_SLO_EVIDENCE: "false"
      PREFLIGHT_SKIP_PERF_EVIDENCE: "false"
      PREFLIGHT_SKIP_SECURITY_EVIDENCE: "false"
      PREFLIGHT_SKIP_ALERT_EVIDENCE: "false"
      PREFLIGHT_REQUIRE_STAGING_EVIDENCE: "true"
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
      STAGING_BASE_DIR: ${{ secrets.STAGING_BASE_DIR }}
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      COMPOSE_PROJECT_NAME: crm-staging
      STAGING_APPROVAL_STATUS: approved
    steps:
      - name: Validate Release Ref
        shell: pwsh
        run: |
          $inputRef = "${{ github.event.inputs.ref || 'main' }}".Trim()
          if ([string]::IsNullOrWhiteSpace($inputRef)) {
            throw "Release ref cannot be empty."
          }
          $allowed = $false
          if ($inputRef -eq "main") { $allowed = $true }
          if ($inputRef -like "refs/heads/main") { $allowed = $true }
          if ($inputRef -like "v*") { $allowed = $true }
          if ($inputRef -like "refs/tags/v*") { $allowed = $true }
          if (-not $allowed) {
            throw "Only main or version tags (v*) are allowed. input ref: $inputRef"
          }

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build
        run: npm run build

      - name: Backend Tests
        run: npm run test:backend:coverage

      - name: Backend Package
        run: mvn -f apps/api/pom.xml -DskipTests package

      - name: Performance Gate
        run: npm run perf:gate
        env:
          PERF_REQUIRE_K6: "true"

      - name: SRE Daily Check
        run: npm run sre:daily-check

      - name: SRE Alert Check
        run: npm run sre:alert-check

      - name: Security Scan
        run: npm run security:scan
        env:
          SECURITY_SCAN_JAVA_ENABLED: "true"
          SECURITY_SCAN_JAVA_REQUIRED: "true"
          SECURITY_SCAN_JAVA_TIMEOUT_MS: "300000"

      - name: Security Scan Summary
        if: always()
        shell: pwsh
        run: |
          $reportPath = "logs/security/security-scan-latest.json"
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath -Raw | ConvertFrom-Json
            $secretFindings = 0
            if ($null -ne $report.checks.secretScan.findings) {
              $secretFindings = @($report.checks.secretScan.findings).Count
            }
            Write-Host ("SECURITY_REPORT pass={0} npmHigh={1} npmCritical={2} secretFindings={3} sbomPass={4} javaStatus={5}" -f $report.pass, $report.checks.npmAudit.high, $report.checks.npmAudit.critical, $secretFindings, $report.checks.sbom.pass, $report.checks.javaDependencyScan.status)
          } else {
            Write-Host "SECURITY_REPORT missing=logs/security/security-scan-latest.json"
          }

      - name: Upload Security Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staging-security-scan-${{ github.run_number }}
          path: |
            logs/security/**
          if-no-files-found: warn

      - name: Release Snapshot
        run: npm run release:snapshot

      - name: Deploy to Staging
        run: npm run staging:deploy -- --artifactVersion ${{ github.sha }}

      - name: Staging Verify
        run: npm run staging:verify

      - name: Staging Release Summary
        run: npm run staging:release:summary

      - name: Production Preflight
        run: npm run preflight:prod

      - name: Rollback Recommendation
        if: failure()
        run: |
          echo "One or more staging gates failed. Rollback is recommended."
          if (Test-Path logs\staging\staging-verify-latest.json) { Get-Content logs\staging\staging-verify-latest.json }
          if (Test-Path logs\staging\staging-deploy-latest.json) { Get-Content logs\staging\staging-deploy-latest.json }

      - name: Upload Staging Evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staging-evidence-${{ github.run_number }}
          path: |
            logs/release/**
            logs/sre/**
            logs/perf/**
            logs/preflight/**
            logs/security/**
            logs/staging/**

