name: Mainline Gate

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'backups/**'
      - 'evaluation/**'

concurrency:
  group: main-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AUTH_TOKEN_SECRET: ${{ secrets.CI_AUTH_TOKEN_SECRET }}
  SECURITY_MFA_STATIC_CODE: ${{ secrets.CI_MFA_STATIC_CODE }}
  SECURITY_SSO_MODE: oidc
  AUTH_BOOTSTRAP_DEFAULT_PASSWORD: ${{ secrets.CI_BOOTSTRAP_PASSWORD }}
  DB_URL: jdbc:mysql://127.0.0.1:3306/crm_local
  DB_USER: ${{ secrets.CI_DB_USER }}
  DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
  LEAD_IMPORT_MQ_PUBLISH_ENABLED: "false"
  PREFLIGHT_SKIP_DRILL_EVIDENCE: "true"
  PREFLIGHT_REQUIRE_STAGING_EVIDENCE: "false"
  PREFLIGHT_SKIP_SECURITY_EVIDENCE: "false"
  PREFLIGHT_SKIP_ALERT_EVIDENCE: "false"

jobs:
  # Job 1: 浠ｇ爜妫€鏌ワ紙鏈€鍏堟墽琛岋紝蹇€熷け璐ワ級
  lint:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Runtime Kernel Import Check
        run: npm run check:runtime-kernel-imports --workspace apps/web

      - name: Pages Entry Export Check
        run: npm run check:pages-entry-exports --workspace apps/web

      - name: Lint
        run: npm run lint

  # Job 2: 鍓嶇鏋勫缓鍜屾祴璇曪紙渚濊禆 lint锛?
  frontend:
    needs: lint
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Runtime Kernel Import Check
        run: npm run check:runtime-kernel-imports --workspace apps/web

      - name: Frontend Unit Tests
        run: npm run test:frontend:coverage

      - name: Build
        run: npm run build

      - name: Full Gate
        run: npm run test:full

      - name: Install k6
        run: choco install k6 -y

      - name: Performance Gate
        run: npm run perf:gate
        env:
          PERF_REQUIRE_K6: "true"

  # Job 3: 鍚庣娴嬭瘯锛堜緷璧?lint锛屼笌 frontend 骞惰锛?
  backend:
    needs: lint
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: API Integration Test
        run: npm run test:api:integration

      - name: Backend Tests
        run: npm run test:backend:coverage

  # Job 4: 瀹夊叏鍜岃繍缁存鏌ワ紙渚濊禆 lint锛屼笌 frontend/backend 骞惰锛?
  security-ops:
    needs: lint
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Security Scan
        run: npm run security:scan
        env:
          SECURITY_SCAN_JAVA_ENABLED: "true"
          SECURITY_SCAN_JAVA_REQUIRED: "false"
          SECURITY_SCAN_JAVA_TIMEOUT_MS: "300000"

      - name: Security Scan Summary
        if: always()
        shell: pwsh
        run: |
          $reportPath = "logs/security/security-scan-latest.json"
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath -Raw | ConvertFrom-Json
            $secretFindings = 0
            if ($null -ne $report.checks.secretScan.findings) {
              $secretFindings = @($report.checks.secretScan.findings).Count
            }
            Write-Host ("SECURITY_REPORT pass={0} npmHigh={1} npmCritical={2} secretFindings={3} sbomPass={4} javaStatus={5}" -f $report.pass, $report.checks.npmAudit.high, $report.checks.npmAudit.critical, $secretFindings, $report.checks.sbom.pass, $report.checks.javaDependencyScan.status)
          } else {
            Write-Host "SECURITY_REPORT missing=logs/security/security-scan-latest.json"
          }

      - name: Upload Security Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: main-security-scan-${{ github.run_number }}
          path: |
            logs/security/**
          if-no-files-found: warn

      - name: SRE Daily Check
        run: npm run sre:daily-check

      - name: SRE Alert Check
        run: npm run sre:alert-check

  # Job 5: 鍙戝竷鍑嗗锛堟墍鏈夋祴璇曢€氳繃鍚庯級
  release-prep:
    needs: [frontend, backend, security-ops]
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Release Snapshot
        run: npm run release:snapshot

      - name: Production Preflight
        run: npm run preflight:prod

      - name: Upload Ops Evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ops-evidence
          path: |
            logs/release/**
            logs/sre/**
            logs/perf/**
            logs/security/**
            logs/preflight/**

