name: Mainline Gate

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'backups/**'
      - 'evaluation/**'

concurrency:
  group: main-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  AUTH_TOKEN_SECRET: ${{ secrets.CI_AUTH_TOKEN_SECRET }}
  SECURITY_MFA_STATIC_CODE: ${{ secrets.CI_MFA_STATIC_CODE }}
  SECURITY_SSO_MODE: oidc
  AUTH_BOOTSTRAP_DEFAULT_PASSWORD: ${{ secrets.CI_BOOTSTRAP_PASSWORD }}
  DB_URL: jdbc:mysql://127.0.0.1:3306/crm_local
  DB_USER: ${{ secrets.CI_DB_USER }}
  DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
  LEAD_IMPORT_MQ_PUBLISH_ENABLED: "false"
  PREFLIGHT_SKIP_DRILL_EVIDENCE: "false"
  PREFLIGHT_REQUIRE_STAGING_EVIDENCE: "false"
  PREFLIGHT_SKIP_SECURITY_EVIDENCE: "false"
  PREFLIGHT_SKIP_ALERT_EVIDENCE: "false"

jobs:
  # Job 0: Detect changed scopes for selective job execution
  changes:
    runs-on: windows-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.scope.outputs.frontend }}
      backend: ${{ steps.scope.outputs.backend }}
      security: ${{ steps.scope.outputs.security }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Detect Changed Scope With Summary
        id: scope
        uses: ./.github/actions/detect-changed-scope-with-summary
        with:
          workflow_file: .github/workflows/main-gate.yml
          security_job_name: security-ops

  # Job 1: Lint and static quality gates
  lint:
    needs: changes
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Prepare Frontend Node Environment
        uses: ./.github/actions/prepare-frontend-node


      - name: Mark Lint Job Start
        uses: ./.github/actions/mark-job-start
        with:
          start_env_var: LINT_JOB_STARTED_AT

      - name: Run Lint Quality Gates
        uses: ./.github/actions/run-lint-quality-gates

      - name: Lint Job Timing Summary
        if: always()
        uses: ./.github/actions/job-timing-summary
        with:
          job_label: Lint
          start_env_var: LINT_JOB_STARTED_AT

  # Job 2: Frontend full gate and performance
  frontend:
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - name: Prepare Frontend Node Environment
        uses: ./.github/actions/prepare-frontend-node


      - name: Mark Frontend Job Start
        uses: ./.github/actions/mark-job-start
        with:
          start_env_var: FRONTEND_JOB_STARTED_AT

      - name: Frontend Unit Tests
        run: npm run test:frontend:coverage

      - name: Build
        run: npm run build

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-v1.58.2-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Full Gate
        timeout-minutes: 20
        run: npm run test:full

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Performance Gate
        timeout-minutes: 12
        run: npm run perf:gate
        env:
          PERF_REQUIRE_K6: "true"

      - name: Upload Frontend Test Artifacts
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          artifact_name: main-frontend-test-artifacts-${{ github.run_number }}
          artifact_path: |
            apps/web/coverage/**
            apps/web/playwright-report/**
            apps/web/test-results/**
            test-results/**
          if_no_files_found: warn

      - name: Upload Frontend Ops Evidence
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          artifact_name: main-frontend-ops-evidence-${{ github.run_number }}
          artifact_path: |
            logs/perf/**
            logs/preflight/**
          if_no_files_found: warn

      - name: Frontend Job Timing Summary
        if: always()
        uses: ./.github/actions/job-timing-summary
        with:
          job_label: Frontend
          start_env_var: FRONTEND_JOB_STARTED_AT

  # Job 3: Backend integration and coverage
  backend:
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Prepare Backend Java Environment
        uses: ./.github/actions/prepare-backend-java

      - name: Mark Backend Job Start
        uses: ./.github/actions/mark-job-start
        with:
          start_env_var: BACKEND_JOB_STARTED_AT

      - name: API Smoke Test
        run: npm run test:api:smoke

      - name: Backend Tests
        run: npm run test:backend:coverage

      - name: Upload Backend Test Artifacts
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          artifact_name: main-backend-test-artifacts-${{ github.run_number }}
          artifact_path: |
            apps/api/target/surefire-reports/**
            apps/api/target/failsafe-reports/**
            apps/api/target/site/jacoco/**
          if_no_files_found: warn

      - name: Backend Job Timing Summary
        if: always()
        uses: ./.github/actions/job-timing-summary
        with:
          job_label: Backend
          start_env_var: BACKEND_JOB_STARTED_AT

  # Job 4: Security and SRE checks
  security-ops:
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.security == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Prepare Frontend Node Environment
        uses: ./.github/actions/prepare-frontend-node


      - name: Mark Security Job Start
        uses: ./.github/actions/mark-job-start
        with:
          start_env_var: SECURITY_JOB_STARTED_AT

      - name: Security Scan
        timeout-minutes: 10
        run: npm run security:scan
        env:
          SECURITY_SCAN_JAVA_ENABLED: "true"
          SECURITY_SCAN_JAVA_REQUIRED: "true"
          SECURITY_SCAN_JAVA_TIMEOUT_MS: "300000"

      - name: Security Scan Summary
        if: always()
        uses: ./.github/actions/security-scan-summary

      - name: Upload Security Artifact
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          artifact_name: main-security-scan-${{ github.run_number }}
          artifact_path: |
            logs/security/**
          if_no_files_found: error

      - name: Upload Security Ops Evidence
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          artifact_name: main-security-ops-evidence-${{ github.run_number }}
          artifact_path: |
            logs/sre/**
            logs/preflight/**
          if_no_files_found: warn

      - name: SRE Daily Check
        timeout-minutes: 5
        run: npm run sre:daily-check

      - name: SRE Alert Check
        timeout-minutes: 5
        run: npm run sre:alert-check

      - name: Security Job Timing Summary
        if: always()
        uses: ./.github/actions/job-timing-summary
        with:
          job_label: Security
          start_env_var: SECURITY_JOB_STARTED_AT

  # Job 5: Release readiness and ops evidence
  release-prep:
    needs: [frontend, backend, security-ops, changes]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.security == 'true') }}
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json


      - name: Mark Release Prep Job Start
        uses: ./.github/actions/mark-job-start
        with:
          start_env_var: RELEASE_PREP_JOB_STARTED_AT

      - name: Run Release Prep Checks
        uses: ./.github/actions/run-release-prep-checks

      - name: Upload Ops Evidence
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          artifact_name: ops-evidence
          artifact_path: |
            logs/release/**
            logs/sre/**
            logs/perf/**
            logs/security/**
            logs/preflight/**
          if_no_files_found: error

      - name: Release Prep Job Timing Summary
        if: always()
        uses: ./.github/actions/job-timing-summary
        with:
          job_label: Release Prep
          start_env_var: RELEASE_PREP_JOB_STARTED_AT

