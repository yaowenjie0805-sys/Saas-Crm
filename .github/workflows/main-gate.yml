name: Mainline Gate

on:
  push:
    branches: [ "master" ]

concurrency:
  group: main-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AUTH_TOKEN_SECRET: ${{ secrets.CI_AUTH_TOKEN_SECRET }}
  SECURITY_MFA_STATIC_CODE: ${{ secrets.CI_MFA_STATIC_CODE }}
  SECURITY_SSO_MODE: oidc
  AUTH_BOOTSTRAP_DEFAULT_PASSWORD: ${{ secrets.CI_BOOTSTRAP_PASSWORD }}
  DB_URL: jdbc:mysql://127.0.0.1:3306/crm_local
  DB_USER: ${{ secrets.CI_DB_USER }}
  DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
  LEAD_IMPORT_MQ_PUBLISH_ENABLED: "false"
  PREFLIGHT_SKIP_DRILL_EVIDENCE: "true"
  PREFLIGHT_REQUIRE_STAGING_EVIDENCE: "false"
  PREFLIGHT_SKIP_SECURITY_EVIDENCE: "false"
  PREFLIGHT_SKIP_ALERT_EVIDENCE: "false"

jobs:
  # Job 1: 代码检查（最先执行，快速失败）
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # Job 2: 前端构建和测试（依赖 lint）
  frontend:
    needs: lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Frontend Unit Tests
        run: npm run test:frontend

      - name: Build
        run: npm run build

      - name: Browser E2E
        run: npm run test:e2e

      - name: Full Gate
        run: npm run test:full

      - name: Install k6
        run: choco install k6 -y

      - name: Performance Gate
        run: npm run perf:gate
        env:
          PERF_REQUIRE_K6: "true"

  # Job 3: 后端测试（依赖 lint，与 frontend 并行）
  backend:
    needs: lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "8"
          cache: "maven"

      - name: Backend Tests
        run: npm run test:backend

  # Job 4: 安全和运维检查（依赖 lint，与 frontend/backend 并行）
  security-ops:
    needs: lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Security Scan
        run: npm run security:scan

      - name: SRE Daily Check
        run: npm run sre:daily-check

      - name: SRE Alert Check
        run: npm run sre:alert-check

  # Job 5: 发布准备（所有测试通过后）
  release-prep:
    needs: [frontend, backend, security-ops]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Release Snapshot
        run: npm run release:snapshot

      - name: Production Preflight
        run: npm run preflight:prod

      - name: Upload Ops Evidence
        uses: actions/upload-artifact@v4
        with:
          name: ops-evidence
          path: |
            logs/release/**
            logs/sre/**
            logs/perf/**
            logs/security/**
            logs/preflight/**
